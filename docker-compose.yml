version: "3.8"

services:

  api:
    build: .
    container_name: jwt_auth_api
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DB_HOST: mysql
    depends_on:
      - mysql
    restart: always

  mysql:
    image: mysql:8
    container_name: jwt_auth_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "#Incubation1151"
      MYSQL_DATABASE: wdc_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: